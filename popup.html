<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hora Exacta en Colombia-Chile-Peru</title>
  <link rel="stylesheet" href="estilo.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400&display=swap">
</head>
<body>
    
<!-- Contenedor principal para controlar el alineado de las tarjetas -->
<div class="reloj-mundial-grid">
  
  <!-- Tarjeta Colombia -->
  <div id="hora-colombia" class="hora-container hCol">
    <div class="info">
      <span class="label">Colombia</span>
      <span class="time">--:--:--</span>
    </div>
  </div>

  <!-- Tarjeta Chile -->
  <div id="hora-chile" class="hora-container hCh">
    <div class="info">
      <span class="label">Chile</span>
      <span class="time">--:--:--</span>
    </div>
  </div>

  <!-- Tarjeta Perú -->
  <div id="hora-peru" class="hora-container hPe">
    <div class="info">
      <span class="label">Perú</span>
      <span class="time">--:--:--</span>
    </div>
  </div>

  <!-- Tarjeta India (Corregido de 'dive' a 'div') -->
  <div id="hora-india" class="hora-container hInd">
    <div class="info">
      <span class="label">India</span>
      <span class="time">--:--:--</span>
    </div>
  </div>

</div>

  <script src="script.js"></script>
</body>
</html>
