<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reloj Mundial Pro</title>
  <link rel="stylesheet" href="estilo.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap">
</head>
<body>
    
  <!-- Usamos <main> para el contenido central de la aplicación -->
  <main class="reloj-mundial-grid">
    
    <!-- Cada tarjeta es un <article>, una unidad de contenido independiente -->
    <article id="hora-colombia" class="hora-container hCol" aria-label="Hora en Colombia"></article>

    <article id="hora-chile" class="hora-container hCh" aria-label="Hora en Chile"></article>

    <article id="hora-peru" class="hora-container hPe" aria-label="Hora en Perú"></article>

    <article id="hora-india" class="hora-container hInd" aria-label="Hora en India"></article>

    <article id="hora-japon" class="hora-container hJap" aria-label="Hora en Japón"></article>

  </main>

  <script src="script.js"></script>
</body>
</html>
